name: river-pipeline (hybrid / W6)

# The hybrid scheduled pipeline. INGEST is owned by the Azure Function (it lands
# bronze in ADLS), so this workflow only TRANSFORMS (dbt against the lake) and
# PUBLISHES. It runs ALONGSIDE the W3 river-pipeline during the parallel window;
# at cutover, disable .github/workflows/pipeline.yml (see docs/w6-cutover-runbook.md).
#
# Auth to Azure is OIDC federated credentials - no long-lived secret. The
# federated identity has Storage Blob Data Contributor on the lake (reads
# bronze, writes lake/publish/).
#
# Requires repo secrets AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID
# and repo variable LAKE_ACCOUNT_NAME (the infra/azure outputs supply these).
on:
  schedule:
    - cron: "10 */3 * * *" # offset 10 min after the Function's ingest (0 */3)
  workflow_dispatch: {} # manual safety net

permissions:
  contents: write # push built artifacts to the data branch
  id-token: write # request the OIDC token for azure/login

# Distinct group from the W3 pipeline so the two never cancel each other during
# the parallel run; never interrupt an in-flight run either.
concurrency:
  group: river-pipeline-hybrid
  cancel-in-progress: false

env:
  LAKE_ACCOUNT_NAME: ${{ vars.LAKE_ACCOUNT_NAME }}
  # The DuckDB azure extension only allows a recursive glob ending in ** (not a
  # **/*.parquet suffix), and ** alone would also match bronze/_latest.json. Scope
  # to the day partitions: parquet only, and a legal pattern. (Local dev uses the
  # filesystem default, which has no such restriction.)
  BRONZE_GLOB: "abfss://lake/bronze/dt=*/**"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install dbt-duckdb duckdb pandas pyarrow PyYAML numpy

      # The dbt warehouse + publish read/write ../data/river.duckdb, but unlike
      # the W3 pipeline this workflow drops ingest (the Function owns it), so
      # nothing creates data/ first. DuckDB will not create the missing parent
      # dir, so make it here.
      - name: Create local warehouse dir
        run: mkdir -p data

      # The DuckDB azure extension uses libcurl on Linux and here fails to locate
      # the CA bundle ("Problem with the SSL CA cert"); it works locally on
      # Windows via the OS cert store. Point the standard OpenSSL/curl env at
      # Ubuntu's bundle (inherited by the dbt + publish steps via GITHUB_ENV), and
      # mirror it to the RHEL-style path some libcurl builds expect.
      - name: CA certs for the DuckDB azure extension
        run: |
          echo "SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> "$GITHUB_ENV"
          echo "SSL_CERT_DIR=/etc/ssl/certs"                      >> "$GITHUB_ENV"
          echo "CURL_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt" >> "$GITHUB_ENV"
          sudo mkdir -p /etc/pki/tls/certs
          sudo cp /etc/ssl/certs/ca-certificates.crt /etc/pki/tls/certs/ca-bundle.crt

      # 1) TRANSFORM -> silver + gold, reading bronze from ADLS via the azure target
      - name: dbt build (reads bronze from ADLS)
        working-directory: transform
        run: |
          dbt deps
          dbt seed --profiles-dir . --target azure
          dbt run  --profiles-dir . --target azure
          dbt test --profiles-dir . --target azure   # fail here -> no publish -> last-known-good

      # The hybrid has no local ingest step, so export.py's run_meta would carry
      # null last_run_utc / rows_ingested (it reads web/data/ingest_meta.json,
      # which only the W3 ingest writes). Bridge the Function's bronze/_latest.json
      # heartbeat into that file so the freshness + row count are real.
      - name: Heartbeat -> ingest_meta
        run: |
          mkdir -p web/data
          az storage blob download --account-name "$LAKE_ACCOUNT_NAME" --auth-mode login \
            --container-name lake --name bronze/_latest.json --file /tmp/hb.json -o none
          jq '{last_ingest_utc: .last_ingest_utc, rows_ingested: .rows}' /tmp/hb.json \
            > web/data/ingest_meta.json
          cat web/data/ingest_meta.json

      # 2) PUBLISH -> gold.json + parquet + run_meta (lineage re-reads bronze from ADLS)
      - name: Publish artifacts
        run: python publish/export.py

      # 3) Land the published parquet in the lake so Synapse external views have
      #    a source (synapse/external_views.sql reads lake/publish/parquet/*).
      - name: Upload published parquet to the lake
        run: |
          for f in web/data/parquet/*.parquet; do
            az storage blob upload \
              --account-name "$LAKE_ACCOUNT_NAME" \
              --auth-mode login \
              --container-name lake \
              --name "publish/parquet/$(basename "$f")" \
              --file "$f" \
              --overwrite true
          done

      # 4) Publish the fresh data to the edge ourselves. deploy.yml only runs on
      #    web/** code pushes, so without this a scheduled refresh reaches the
      #    data branch but never the CDN, and the dashboard (incl. the Feature C
      #    in-browser trace, which reads the layer Parquet from the edge) serves
      #    stale data. Scoped to the data/ prefix via a dedicated least-privilege
      #    role (infra/github_oidc.tf), separate from the full-site deploy role.
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.DATA_PUBLISH_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Publish fresh data to the edge
        run: |
          aws s3 sync web/data "s3://${{ vars.SITE_BUCKET }}/data" --delete
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/data/*"

      # 5) Commit built data to the `data` branch (keeps `main` history human,
      #    and remains the source deploy.yml pulls web/data from on code deploys)
      - name: Push to data branch
        run: |
          git config user.name  "river-bot"
          git config user.email "bot@reecewall.dev"
          git add -f web/data
          git stash
          git fetch origin data || true
          git switch -C data
          git stash pop || true
          git add -f web/data
          git commit -m "data: hybrid refresh $(date -u +%FT%TZ)" || echo "no changes"
          git push -f origin data
