name: infra

# Static analysis ONLY. terraform apply is human-run, never CI: this never
# touches remote state, cloud credentials or live resources. Runs on PRs that
# change infra/.
on:
  pull_request:
    paths:
      - "infra/**"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.10.0"
      - name: terraform fmt
        working-directory: infra
        run: terraform fmt -check -recursive
      - name: terraform init (no backend) + validate
        working-directory: infra
        run: |
          terraform init -backend=false
          terraform validate
      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
      - name: tflint
        working-directory: infra
        run: |
          tflint --init
          tflint
      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: infra
          severity: HIGH,CRITICAL
          exit-code: "1"
