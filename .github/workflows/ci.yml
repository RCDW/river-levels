name: ci

# The gate for every PR: Python + SQL lint, and a dbt build + test that proves
# the transform layer produces a queryable, tested artifact (not just that the
# SQL compiles). Data comes from a deterministic fixture, never the live API.
on:
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: ruff lint
        run: ruff check .
      - name: ruff format check
        run: ruff format --check .

  dbt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install toolchain
        run: |
          pip install -r ingest/requirements.txt
          pip install -r requirements-dev.txt
      - name: Generate bronze fixture (deterministic, no live API)
        run: python -m ci.make_bronze_fixture
      - name: dbt build + test (data smoke test)
        working-directory: transform
        run: |
          dbt deps
          dbt seed --profiles-dir .
          dbt run --profiles-dir .
          dbt test --profiles-dir .
      - name: sqlfluff lint
        working-directory: transform
        run: sqlfluff lint models
